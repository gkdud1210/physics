<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Physics Study</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left:'$$', right:'$$', display:true},
      {left:'$', right:'$', display:false}
    ],
    throwOnError: false
  })"></script>
<style>
  :root {
    --blue-900: #0f172a;
    --blue-800: #1e3a5f;
    --blue-700: #1d4ed8;
    --blue-600: #2563eb;
    --blue-500: #3b82f6;
    --blue-400: #60a5fa;
    --blue-300: #93c5fd;
    --blue-100: #dbeafe;
    --blue-50:  #eff6ff;
    --green:    #10b981;
    --red:      #ef4444;
    --white:    #ffffff;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08);
    --shadow-md: 0 4px 16px rgba(15,23,42,.10);
    --shadow-lg: 0 10px 40px rgba(15,23,42,.14);
    --radius:   12px;
    --radius-lg:18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%);
    min-height: 100vh;
    color: var(--gray-800);
  }

  /* NAV */
  .nav {
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,.10);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky; top: 0; z-index: 100;
  }
  .nav-logo {
    display: flex; align-items: center; gap: 10px;
    color: var(--white); font-weight: 700; font-size: 1.1rem;
  }
  .nav-logo .icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-400));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    box-shadow: 0 4px 12px rgba(59,130,246,.4);
  }
  .home-btn {
    background: rgba(255,255,255,.10);
    border: none; border-radius: 8px;
    color: rgba(255,255,255,.8); font-size: 1rem;
    width: 36px; height: 36px;
    cursor: pointer; transition: background .2s, transform .2s;
    display: flex; align-items: center; justify-content: center;
  }
  .home-btn:hover { background: rgba(255,255,255,.2); transform: scale(1.1); }

  .lang-toggle { display: flex; background: rgba(255,255,255,.10); border-radius: 8px; overflow: hidden; }
  .lang-btn {
    background: transparent; border: none;
    color: rgba(255,255,255,.6); font-size: .8rem; font-weight: 600;
    padding: 6px 14px; cursor: pointer; transition: all .2s;
  }
  .lang-btn.active { background: var(--blue-600); color: var(--white); border-radius: 6px; }
  .lang-btn:hover:not(.active) { color: var(--white); }

  /* MAIN */
  .main { max-width: 900px; margin: 0 auto; padding: 32px 16px 64px; display: flex; flex-direction: column; gap: 24px; }

  /* STAT BAR */
  .stat-bar { display: grid; grid-template-columns: repeat(3,1fr); gap: 16px; }
  .stat-card {
    background: rgba(255,255,255,.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: var(--radius);
    padding: 20px; text-align: center; color: var(--white);
  }
  .stat-num { font-size: 1.8rem; font-weight: 800; line-height: 1; margin-bottom: 4px; }
  .stat-num.green { color: #6ee7b7; }
  .stat-num.red   { color: #fca5a5; }
  .stat-num.blue  { color: var(--blue-300); }
  .stat-label { font-size: .78rem; color: rgba(255,255,255,.55); font-weight: 500; }

  /* CARD */
  .card { background: var(--white); border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); overflow: hidden; }
  .card-header {
    padding: 20px 28px; border-bottom: 1px solid var(--gray-200);
    display: flex; align-items: center; justify-content: space-between;
  }
  .card-title {
    font-size: .85rem; font-weight: 700; color: var(--blue-700);
    letter-spacing: .4px; text-transform: uppercase;
    display: flex; align-items: center; gap: 8px;
  }
  .card-title::before {
    content: ''; width: 4px; height: 16px;
    background: linear-gradient(180deg, var(--blue-500), var(--blue-700));
    border-radius: 2px; display: block;
  }
  .card-body { padding: 28px; }

  /* TABS */
  .tabs { display: flex; gap: 4px; background: var(--gray-100); border-radius: 10px; padding: 4px; }
  .tab {
    flex: 1; background: transparent; border: none; border-radius: 8px;
    padding: 10px 0; font-size: .85rem; font-weight: 600;
    color: var(--gray-400); cursor: pointer; transition: all .2s;
  }
  .tab.active { background: var(--white); color: var(--blue-700); box-shadow: var(--shadow-sm); }
  .tab:hover:not(.active) { color: var(--gray-600); }

  /* SECTIONS */
  #problem-section, #wrong-section, #progress-section { display: none; }
  #problem-section.visible, #wrong-section.visible, #progress-section.visible { display: block; }

  /* BADGE */
  .badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; border-radius: 20px;
    font-size: .75rem; font-weight: 600; letter-spacing: .3px;
  }
  .badge-blue   { background: var(--blue-100); color: var(--blue-700); }
  .badge-green  { background: #d1fae5; color: #065f46; }
  .badge-yellow { background: #fef3c7; color: #92400e; }
  .badge-red    { background: #fee2e2; color: #991b1b; }

  .problem-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .problem-number { font-size: .8rem; color: var(--gray-400); margin-left: auto; font-weight: 600; }

  /* QUESTION BOX */
  .question-box {
    background: linear-gradient(135deg, var(--blue-50), #f0f9ff);
    border: 1.5px solid var(--blue-100);
    border-radius: var(--radius); padding: 24px; margin-bottom: 24px;
    position: relative; overflow: hidden;
  }
  .question-box::before {
    content: ''; position: absolute; top: 0; left: 0; width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--blue-500), var(--blue-700));
  }
  .question-text { font-size: 1.05rem; line-height: 1.75; color: var(--gray-800); padding-left: 8px; font-weight: 500; }

  /* ANSWER */
  .answer-area { display: flex; flex-direction: column; gap: 14px; }
  .input-label { font-size: .8rem; font-weight: 700; color: var(--gray-600); letter-spacing: .3px; text-transform: uppercase; }
  .answer-row { display: flex; gap: 12px; }
  .answer-input {
    flex: 1; border: 2px solid var(--gray-200); border-radius: var(--radius);
    padding: 14px 18px; font-size: .95rem; color: var(--gray-800);
    outline: none; transition: border-color .2s, box-shadow .2s; font-family: inherit;
  }
  .answer-input:focus { border-color: var(--blue-500); box-shadow: 0 0 0 4px rgba(59,130,246,.12); }
  .answer-input::placeholder { color: var(--gray-400); }

  /* BUTTONS */
  .btn {
    border: none; border-radius: var(--radius); padding: 14px 28px;
    font-size: .9rem; font-weight: 700; cursor: pointer;
    transition: all .2s; letter-spacing: .2px; white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue-600), var(--blue-700));
    color: var(--white); box-shadow: 0 4px 12px rgba(37,99,235,.3);
  }
  .btn-primary:hover { background: linear-gradient(135deg, var(--blue-500), var(--blue-600)); transform: translateY(-1px); }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost { background: var(--gray-100); color: var(--gray-600); }
  .btn-ghost:hover { background: var(--gray-200); }
  .btn-hint {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e; border: 1.5px solid #fbbf24;
  }
  .btn-hint:hover { background: linear-gradient(135deg, #fde68a, #fbbf24); color: #78350f; }

  /* FEEDBACK */
  .feedback {
    display: none; border-radius: var(--radius); padding: 18px 20px;
    margin-top: 4px; border: 1.5px solid;
    animation: feedIn .3s ease;
  }
  @keyframes feedIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .feedback.correct { display: flex; background: #f0fdf4; border-color: #86efac; color: #166534; }
  .feedback.wrong   { display: flex; background: #fef2f2; border-color: #fca5a5; color: #991b1b; }
  .feedback-icon { font-size: 1.3rem; margin-right: 12px; flex-shrink: 0; }
  .feedback-title { font-weight: 700; font-size: .9rem; margin-bottom: 2px; }
  .feedback-sub   { font-size: .83rem; opacity: .8; }

  /* EXPLANATION */
  .explanation { display: none; border-radius: var(--radius); margin-top: 12px; animation: feedIn .3s ease; overflow: hidden; border: 1.5px solid #fbbf24; }
  .explanation.visible { display: block; }
  .explanation-header {
    display: flex; align-items: center; gap: 8px; padding: 13px 20px;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    color: #fff; font-weight: 700; font-size: .83rem; letter-spacing: .4px; text-transform: uppercase;
  }
  .explanation-body { padding: 20px 24px; font-size: .9rem; line-height: 1.85; color: #44403c; background: linear-gradient(135deg, #fefce8, #fff7ed); }
  .explanation-body b { color: #92400e; }
  .explanation-body .katex-display { margin: .6em 0; }

  /* ACTION ROW */
  .action-row { display: flex; justify-content: flex-end; gap: 10px; margin-top: 16px; }

  /* ── SPLASH ───────────────────────────────────── */
  #splash {
    position: fixed; inset: 0; z-index: 999;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 28px;
    transition: opacity .6s ease, visibility .6s ease;
  }
  #splash.hide { opacity: 0; visibility: hidden; }

  .splash-emoji {
    font-size: 5rem;
    animation: wave 1.2s ease-in-out infinite;
    transform-origin: 70% 80%;
  }
  @keyframes wave {
    0%,100% { transform: rotate(-8deg); }
    50%      { transform: rotate(12deg); }
  }

  .splash-title {
    font-size: 2.4rem;
    font-weight: 900;
    color: #fff;
    letter-spacing: -1px;
    text-align: center;
    animation: popIn .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(.7) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .splash-sub {
    font-size: 1rem;
    color: rgba(255,255,255,.55);
    font-weight: 500;
    animation: popIn .5s .15s cubic-bezier(.34,1.56,.64,1) both;
  }

  .splash-btn {
    margin-top: 8px;
    background: rgba(255,255,255,.12);
    border: 1.5px solid rgba(255,255,255,.25);
    color: #fff;
    border-radius: 999px;
    padding: 12px 32px;
    font-size: .95rem;
    font-weight: 700;
    cursor: pointer;
    backdrop-filter: blur(8px);
    transition: background .2s, transform .2s;
    animation: popIn .5s .3s cubic-bezier(.34,1.56,.64,1) both;
  }
  .splash-btn:hover { background: rgba(255,255,255,.22); transform: scale(1.05); }

  /* 난이도 선택 */
  .diff-select-label {
    font-size: .85rem; color: rgba(255,255,255,.5); font-weight: 600;
    letter-spacing: .5px; text-transform: uppercase;
    animation: popIn .5s .25s cubic-bezier(.34,1.56,.64,1) both;
  }
  .diff-btns {
    display: flex; gap: 14px;
    animation: popIn .5s .3s cubic-bezier(.34,1.56,.64,1) both;
  }
  .diff-btn {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
    background: rgba(255,255,255,.08);
    border: 2px solid rgba(255,255,255,.15);
    border-radius: 16px;
    padding: 18px 28px;
    cursor: pointer;
    color: #fff;
    transition: all .2s;
    backdrop-filter: blur(8px);
  }
  .diff-btn:hover      { transform: translateY(-4px); background: rgba(255,255,255,.15); }
  .diff-btn.selected   { border-color: var(--blue-400); background: rgba(96,165,250,.25); }
  .diff-btn .diff-icon { font-size: 1.8rem; }
  .diff-btn .diff-name { font-size: 1.1rem; font-weight: 900; }
  .diff-btn .diff-desc { font-size: .72rem; color: rgba(255,255,255,.5); font-weight: 500; }

  .diff-easy   { }
  .diff-medium { }
  .diff-hard   { }

  .splash-start {
    background: linear-gradient(135deg, var(--blue-600), var(--blue-500));
    border: none; border-radius: 999px;
    color: #fff; font-size: .95rem; font-weight: 700;
    padding: 13px 36px; cursor: pointer;
    box-shadow: 0 4px 18px rgba(59,130,246,.4);
    transition: all .2s;
    animation: popIn .5s .4s cubic-bezier(.34,1.56,.64,1) both;
  }
  .splash-start:hover { transform: translateY(-2px); box-shadow: 0 6px 24px rgba(59,130,246,.5); }
  .splash-start:disabled { opacity: .35; cursor: default; transform: none; }

  .splash-timer {
    display: flex; gap: 6px; align-items: center;
    animation: popIn .5s .5s cubic-bezier(.34,1.56,.64,1) both;
  }
  .splash-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.25);
    transition: background .3s;
  }
  .splash-dot.active { background: var(--blue-400); }

  /* PROGRESS BAR */
  .progress-wrap { background: var(--gray-200); border-radius: 999px; height: 8px; overflow: hidden; margin-bottom: 8px; }
  .progress-bar { height: 100%; border-radius: 999px; background: linear-gradient(90deg, var(--blue-500), var(--blue-400)); transition: width .6s ease; }
  .progress-label { display: flex; justify-content: space-between; font-size: .78rem; color: var(--gray-400); font-weight: 600; }

  /* WRONG LIST */
  .wrong-list { display: flex; flex-direction: column; gap: 16px; }
  .wrong-item { border: 1.5px solid var(--gray-200); border-radius: var(--radius); overflow: hidden; transition: box-shadow .2s; }
  .wrong-item:hover { box-shadow: var(--shadow-md); }
  .wrong-item-header { padding: 16px 20px; background: var(--gray-100); display: flex; align-items: flex-start; gap: 10px; }
  .wrong-q { font-size: .9rem; font-weight: 500; color: var(--gray-800); line-height: 1.5; }
  .wrong-item-body { padding: 16px 20px; display: flex; gap: 24px; flex-wrap: wrap; }
  .answer-chip { display: flex; flex-direction: column; gap: 3px; }
  .chip-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-400); }
  .chip-val { font-size: .9rem; font-weight: 600; }
  .chip-val.mine { color: var(--red); }
  .chip-val.correct-ans { color: var(--green); }
  .wrong-exp { padding: 14px 20px; background: #fffbeb; border-top: 1px solid #fde68a; font-size: .83rem; color: #78350f; line-height: 1.65; }

  /* EMPTY */
  .empty { text-align: center; padding: 60px 20px; color: var(--gray-400); }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-size: .9rem; font-weight: 500; }

  @media (max-width: 600px) {
    .nav { padding: 0 16px; }
    .main { padding: 20px 12px 48px; }
    .stat-bar { gap: 8px; }
    .stat-card { padding: 14px 8px; }
    .stat-num { font-size: 1.4rem; }
    .card-body { padding: 20px; }
    .answer-row { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-emoji">👋</div>
  <div style="text-align:center">
    <div class="splash-title">안녕 건우!</div>
    <div class="splash-sub">물리 공부 파이팅! ⚡</div>
  </div>

  <div class="diff-select-label">난이도를 선택하세요</div>

  <div class="diff-btns">
    <button class="diff-btn diff-easy selected" id="dbtn-easy" onclick="selectDiff('easy')">
      <span class="diff-icon">🌱</span>
      <span class="diff-name">하</span>
      <span class="diff-desc">기초 개념</span>
    </button>
    <button class="diff-btn diff-medium" id="dbtn-medium" onclick="selectDiff('medium')">
      <span class="diff-icon">🔥</span>
      <span class="diff-name">중</span>
      <span class="diff-desc">발전 문제</span>
    </button>
    <button class="diff-btn diff-hard" id="dbtn-hard" onclick="selectDiff('hard')">
      <span class="diff-icon">⚡</span>
      <span class="diff-name">상</span>
      <span class="diff-desc">심화 문제</span>
    </button>
  </div>

  <button class="splash-start" id="splash-start-btn" onclick="startWithDiff()">문제 풀기 시작 →</button>

  <div class="splash-timer">
    <div class="splash-dot active" id="dot0"></div>
    <div class="splash-dot" id="dot1"></div>
    <div class="splash-dot" id="dot2"></div>
  </div>
</div>

<nav class="nav">
  <div class="nav-logo" onclick="showSplash()" style="cursor:pointer" title="홈으로">
    <div class="icon">⚡</div>
    Physics Study
  </div>
  <div style="display:flex;align-items:center;gap:10px">
    <button class="home-btn" onclick="showSplash()" title="홈으로">🏠</button>
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">KO</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<div class="main">

  <div class="stat-bar">
    <div class="stat-card">
      <div class="stat-num blue" id="stat-total">10</div>
      <div class="stat-label" id="lbl-total">전체 문제</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="stat-correct">0</div>
      <div class="stat-label" id="lbl-correct">정답</div>
    </div>
    <div class="stat-card">
      <div class="stat-num red" id="stat-wrong">0</div>
      <div class="stat-label" id="lbl-wrong">오답</div>
    </div>
  </div>

  <div class="card">
    <div class="card-body" style="padding-bottom:0">
      <div class="tabs">
        <button class="tab active" id="tab-problem"  onclick="switchTab('problem')" >문제 풀기</button>
        <button class="tab"        id="tab-wrong"    onclick="switchTab('wrong')"   >오답 노트</button>
        <button class="tab"        id="tab-progress" onclick="switchTab('progress')">진도</button>
      </div>
    </div>

    <!-- PROBLEM TAB -->
    <div id="problem-section" class="visible">
      <div class="card-header">
        <span class="card-title" id="lbl-today">오늘의 문제</span>
        <span class="problem-number" id="prob-counter"></span>
      </div>
      <div class="card-body">
        <div class="problem-meta">
          <span class="badge badge-blue" id="prob-concept"></span>
          <span class="badge" id="prob-difficulty"></span>
        </div>
        <div class="question-box">
          <div class="question-text" id="question-text"></div>
        </div>
        <div class="answer-area">
          <div class="input-label" id="lbl-answer">정답 입력</div>
          <div class="answer-row">
            <input type="text" class="answer-input" id="answer-input"
              placeholder="답을 입력하세요…"
              onkeydown="if(event.key==='Enter') submitAnswer()" />
            <button class="btn btn-primary" id="submit-btn" onclick="submitAnswer()">제출</button>
          </div>
        </div>

        <div class="feedback" id="feedback-box">
          <div class="feedback-icon" id="feedback-icon"></div>
          <div>
            <div class="feedback-title" id="feedback-title"></div>
            <div class="feedback-sub"   id="feedback-sub"></div>
          </div>
        </div>

        <div class="explanation" id="explanation-box">
          <div class="explanation-header">📐 <span id="lbl-solution">풀이 해설</span></div>
          <div class="explanation-body" id="explanation-text"></div>
        </div>

        <div class="action-row" id="action-row" style="display:none">
          <button class="btn btn-ghost" id="retry-btn" onclick="loadProblem(currentIdx)">다시 풀기</button>
          <button class="btn btn-hint"  id="hint-btn"  onclick="toggleExplanation()">📐 해설보기</button>
          <button class="btn btn-primary" id="next-btn" onclick="nextProblem()">다음 문제 →</button>
        </div>
      </div>
    </div>

    <!-- WRONG TAB -->
    <div id="wrong-section">
      <div class="card-header">
        <span class="card-title" id="lbl-wrong-title">오답 노트</span>
        <span class="badge badge-red" id="wrong-count-badge"></span>
      </div>
      <div class="card-body">
        <div id="wrong-list" class="wrong-list"></div>
        <div id="wrong-empty" class="empty" style="display:none">
          <div class="empty-icon">🎉</div>
          <div class="empty-text" id="lbl-no-wrong">오답이 없어요! 훌륭해요.</div>
        </div>
      </div>
    </div>

/* ============================================================

   ============================================================ */
function switchTab(tab) {
  ['problem','wrong','progress'].forEach(s => {
    document.getElementById(`${s}-section`).classList.toggle('visible', s===tab);
    document.getElementById(`tab-${s}`).classList.toggle('active', s===tab);
  });
  if (tab==='wrong')    renderWrongList();

/* ============================================================
   PROBLEM
   ============================================================ */
function loadProblem(idx) {
  if (!filteredProblems.length) return;
  currentIdx = idx % filteredProblems.length;
  answered   = false;

  // 다시 풀기 시 현재 문제 오답 기록 초기화
  const record = getRecord();
  record.wrong = record.wrong.filter(w => w.id !== filteredProblems[currentIdx].id);
  saveRecord(record);
  document.getElementById('stat-wrong').textContent = record.wrong.length;

  document.getElementById('feedback-box').className   = 'feedback';
  document.getElementById('explanation-box').className= 'explanation';
  document.getElementById('explanation-text').innerHTML = '';
  document.getElementById('action-row').style.display  = 'none';
  document.getElementById('answer-input').value        = '';
  document.getElementById('submit-btn').disabled       = false;
  renderProblem();
}

function renderProblem() {
  if (!filteredProblems.length) return;
  const p = filteredProblems[currentIdx];
  document.getElementById('question-text').innerHTML =
    lang==='ko' ? p.question_ko : p.question_en;
  document.getElementById('prob-concept').textContent =
    lang==='ko' ? p.concept_ko : p.concept_en;

  const diffEl = document.getElementById('prob-difficulty');
  const diffMap = {easy:'badge-green', medium:'badge-yellow', hard:'badge-red'};
  diffEl.textContent = DIFF_LABEL[p.difficulty] || p.difficulty;
  diffEl.className   = 'badge ' + (diffMap[p.difficulty] || 'badge-blue');

  document.getElementById('prob-counter').textContent =
    `${currentIdx+1} / ${filteredProblems.length}`;

  if (window.renderMathInElement) {
    renderMathInElement(document.getElementById('question-text'), {
      delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
      throwOnError: false
    });
  }
}

function nextProblem() { loadProblem(currentIdx + 1); }

/* ============================================================
   SUBMIT
   ============================================================ */
function submitAnswer() {
  if (answered) return;
  const input = document.getElementById('answer-input');
  const ans   = input.value.trim();
  if (!ans) {
    input.style.borderColor = 'var(--red)';
    setTimeout(() => input.style.borderColor = '', 800);
    return;
  }
  answered = true;
  document.getElementById('submit-btn').disabled = true;

  const p = filteredProblems[currentIdx];
  const isCorrect = ans === p.answer;
  const record    = getRecord();

  const fb      = document.getElementById('feedback-box');
  const fbIcon  = document.getElementById('feedback-icon');
  const fbTitle = document.getElementById('feedback-title');
  const fbSub   = document.getElementById('feedback-sub');

  if (isCorrect) {
    fb.className = 'feedback correct';
    fbIcon.textContent  = '✅';
    fbTitle.textContent = t('correct_msg');
    fbSub.textContent   = t('correct_sub');

    if (!record.correct.includes(p.id)) record.correct.push(p.id);
    record.wrong = record.wrong.filter(w => w.id !== p.id);
    saveStreak(getStreak() + 1);
  } else {
    fb.className = 'feedback wrong';
    fbIcon.textContent  = '❌';
    fbTitle.textContent = t('wrong_msg');
    fbSub.textContent   = t('wrong_prefix') + p.answer;

    const existing = record.wrong.find(w => w.id === p.id);
    if (!existing) {
      record.wrong.push({ id: p.id, myAnswer: ans });
    } else {
      existing.myAnswer = ans;
    }
    saveStreak(0);
  }
  saveRecord(record);

  // 통계 업데이트
  document.getElementById('stat-correct').textContent = record.correct.length;
  document.getElementById('stat-wrong').textContent   = record.wrong.length;

  // 해설 자동 표시 (정답·오답 모두)
  const expHtml = lang==='ko' ? p.explanation_ko : p.explanation_en;
  if (expHtml) {
    document.getElementById('lbl-solution').textContent = t('solution');
    document.getElementById('explanation-text').innerHTML = expHtml;
    document.getElementById('explanation-box').classList.add('visible');
    if (window.renderMathInElement) {
      renderMathInElement(document.getElementById('explanation-text'), {
        delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
        throwOnError: false
      });
    }
  }

  document.getElementById('action-row').style.display = 'flex';
  document.getElementById('retry-btn').textContent = t('retry');
  document.getElementById('hint-btn').textContent  = t('hideHint');
  document.getElementById('next-btn').textContent  = t('next');
}

/* ============================================================
   EXPLANATION
   ============================================================ */
function toggleExplanation() {
  const box = document.getElementById('explanation-box');
  const btn = document.getElementById('hint-btn');
  const p   = filteredProblems[currentIdx];

  if (box.classList.contains('visible')) {
    box.classList.remove('visible');
    btn.textContent = t('hint');
  } else {
    document.getElementById('lbl-solution').textContent = t('solution');
    document.getElementById('explanation-text').innerHTML =
      lang==='ko' ? p.explanation_ko : p.explanation_en;
    box.classList.add('visible');
    btn.textContent = t('hideHint');
    if (window.renderMathInElement) {
      renderMathInElement(document.getElementById('explanation-text'), {
        delimiters: [{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}],
        throwOnError: false
      });
    }
  }
}

/* ============================================================
   WRONG LIST
   ============================================================ */
function renderWrongList() {
  const record = getRecord();
  const list   = document.getElementById('wrong-list');
  const empty  = document.getElementById('wrong-empty');
  const badge  = document.getElementById('wrong-count-badge');

  badge.textContent = record.wrong.length + (lang==='ko' ? '개' : '');

  if (!record.wrong.length) {
    list.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  list.innerHTML = record.wrong.map((w, i) => {
    const p   = PROBLEMS.find(x => x.id === w.id);
    if (!p) return '';
    const q   = lang==='ko' ? p.question_ko : p.question_en;
    const exp = lang==='ko' ? p.explanation_ko : p.explanation_en;
    return `
    <div class="wrong-item">
      <div class="wrong-item-header">
        <span class="badge badge-red" style="flex-shrink:0">${i+1}</span>
        <div class="wrong-q" id="wq-${i}">${q}</div>
      </div>
      <div class="wrong-item-body">
        <div class="answer-chip">
          <span class="chip-label">${t('my_ans')}</span>
          <span class="chip-val mine">${w.myAnswer}</span>
        </div>
        <div class="answer-chip">
          <span class="chip-label">${t('correct_ans')}</span>
          <span class="chip-val correct-ans">${p.answer}</span>
        </div>
      </div>
      ${exp ? `<div class="wrong-exp" id="we-${i}">${exp}</div>` : ''}
    </div>`;
  }).join('');

  // KaTeX 렌더
  if (window.renderMathInElement) {
    record.wrong.forEach((_, i) => {
      const qEl = document.getElementById(`wq-${i}`);
      const eEl = document.getElementById(`we-${i}`);
      const opts = { delimiters:[{left:'$$',right:'$$',display:true},{left:'$',right:'$',display:false}], throwOnError:false };
      if (qEl) renderMathInElement(qEl, opts);
      if (eEl) renderMathInElement(eEl, opts);
    });
  }
}

/* ============================================================
   PROGRESS
   ============================================================ */
function renderProgress() {
  const record = getRecord();
  const total  = record.correct.length + record.wrong.length;
  const pct    = total ? Math.round(record.correct.length / total * 100) : 0;
  const streak = getStreak();

  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('pct-label').textContent    = pct + '%';
  document.getElementById('pct-correct-label').textContent = t('correct_lbl') + record.correct.length;
  document.getElementById('pct-total-label').textContent   = t('total_lbl') + total;
  document.getElementById('prog-solved').textContent  = total;
  document.getElementById('prog-streak').textContent  = '🔥 ' + streak;
}

function resetProgress() {
  if (!confirm(t('confirm_reset'))) return;
  localStorage.removeItem('physics_record');
  localStorage.removeItem('physics_streak');
  document.getElementById('stat-correct').textContent = '0';
  document.getElementById('stat-wrong').textContent   = '0';
  loadProblem(0);
  renderProgress();
}

}

function startWithDiff() {
  filteredProblems = PROBLEMS.filter(p => p.difficulty === selectedDiff);
  hideSplash();
  if (!filteredProblems.length) {
    showEmptyDiff();
  } else {
    loadProblem(0);
  }
}

function showEmptyDiff() {
  const label = DIFF_LABEL[selectedDiff];
  document.getElementById('question-text').innerHTML =
    `<span style="color:var(--gray-400);font-size:.95rem">난이도 <b>'${label}'</b> 문제가 아직 준비 중이에요 😊</span>`;
  document.getElementById('prob-concept').textContent = '';
  document.getElementById('prob-difficulty').textContent = '';
  document.getElementById('prob-counter').textContent = '0 / 0';
  document.getElementById('answer-input').value = '';
  document.getElementById('answer-area') && (document.querySelector('.answer-area').style.visibility = 'hidden');
}

function hideSplash() {
  document.getElementById('splash').classList.add('hide');
  document.querySelector('.answer-area').style.visibility = 'visible';
}

function showSplash() {
  document.getElementById('splash').classList.remove('hide');
}

// 스플래시 점 애니메이션 (자동 닫힘 없음 — 난이도 선택 후 시작)
(function() {
  const dots = [0,1,2].map(i => document.getElementById('dot'+i));
  let tick = 0;
  setInterval(() => {
    tick++;
    dots.forEach((d,i) => d.classList.toggle('active', i === tick % 3));
  }, 800);
})();
