<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Physics Study</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/contrib/auto-render.min.js"
  onload="renderMathInElement(document.body, {
    delimiters: [
      {left:'$$', right:'$$', display:true},
      {left:'$', right:'$', display:false}
    ]
  })"></script>
<style>
  :root {
    --blue-900: #0f172a;
    --blue-800: #1e3a5f;
    --blue-700: #1d4ed8;
    --blue-600: #2563eb;
    --blue-500: #3b82f6;
    --blue-400: #60a5fa;
    --blue-300: #93c5fd;
    --blue-100: #dbeafe;
    --blue-50:  #eff6ff;
    --green:    #10b981;
    --red:      #ef4444;
    --yellow:   #f59e0b;
    --white:    #ffffff;
    --gray-100: #f1f5f9;
    --gray-200: #e2e8f0;
    --gray-400: #94a3b8;
    --gray-600: #475569;
    --gray-800: #1e293b;
    --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.05);
    --shadow-md: 0 4px 16px rgba(15,23,42,.10);
    --shadow-lg: 0 10px 40px rgba(15,23,42,.14);
    --radius:   12px;
    --radius-lg:18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e3a5f 50%, #1e40af 100%);
    min-height: 100vh;
    color: var(--gray-800);
    padding: 0;
  }

  /* ─── TOP NAV ─────────────────────────────────── */
  .nav {
    background: rgba(255,255,255,.06);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid rgba(255,255,255,.10);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    color: var(--white);
    font-weight: 700;
    font-size: 1.1rem;
    letter-spacing: -.3px;
  }
  .nav-logo .icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--blue-500), var(--blue-400));
    border-radius: 9px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
    box-shadow: 0 4px 12px rgba(59,130,246,.4);
  }
  .nav-right { display: flex; align-items: center; gap: 12px; }
  .lang-toggle {
    display: flex;
    background: rgba(255,255,255,.10);
    border-radius: 8px;
    overflow: hidden;
  }
  .lang-btn {
    background: transparent;
    border: none;
    color: rgba(255,255,255,.6);
    font-size: .8rem;
    font-weight: 600;
    padding: 6px 14px;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .5px;
  }
  .lang-btn.active {
    background: var(--blue-600);
    color: var(--white);
    border-radius: 6px;
  }
  .lang-btn:hover:not(.active) { color: var(--white); }

  /* ─── MAIN LAYOUT ─────────────────────────────── */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 16px 64px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ─── STAT BAR ────────────────────────────────── */
  .stat-bar {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }
  .stat-card {
    background: rgba(255,255,255,.08);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.12);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    color: var(--white);
  }
  .stat-num {
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-num.green  { color: #6ee7b7; }
  .stat-num.red    { color: #fca5a5; }
  .stat-num.blue   { color: var(--blue-300); }
  .stat-label { font-size: .78rem; color: rgba(255,255,255,.55); font-weight: 500; letter-spacing: .3px; }

  /* ─── CARD BASE ───────────────────────────────── */
  .card {
    background: var(--white);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-lg);
    overflow: hidden;
  }
  .card-header {
    padding: 20px 28px;
    border-bottom: 1px solid var(--gray-200);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .card-title {
    font-size: .85rem;
    font-weight: 700;
    color: var(--blue-700);
    letter-spacing: .4px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::before {
    content: '';
    width: 4px; height: 16px;
    background: linear-gradient(180deg, var(--blue-500), var(--blue-700));
    border-radius: 2px;
    display: block;
  }
  .card-body { padding: 28px; }

  /* ─── TABS ────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--gray-100);
    border-radius: 10px;
    padding: 4px;
  }
  .tab {
    flex: 1;
    background: transparent;
    border: none;
    border-radius: 8px;
    padding: 10px 0;
    font-size: .85rem;
    font-weight: 600;
    color: var(--gray-400);
    cursor: pointer;
    transition: all .2s;
  }
  .tab.active {
    background: var(--white);
    color: var(--blue-700);
    box-shadow: var(--shadow-sm);
  }
  .tab:hover:not(.active) { color: var(--gray-600); }

  /* ─── PROBLEM CARD ────────────────────────────── */
  #problem-section, #wrong-section, #progress-section {
    display: none;
  }
  #problem-section.visible,
  #wrong-section.visible,
  #progress-section.visible { display: block; }

  .problem-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: .75rem;
    font-weight: 600;
    letter-spacing: .3px;
  }
  .badge-blue { background: var(--blue-100); color: var(--blue-700); }
  .badge-green { background: #d1fae5; color: #065f46; }
  .badge-yellow { background: #fef3c7; color: #92400e; }
  .badge-red { background: #fee2e2; color: #991b1b; }

  .problem-number {
    font-size: .8rem;
    color: var(--gray-400);
    margin-left: auto;
    font-weight: 600;
  }

  .question-box {
    background: linear-gradient(135deg, var(--blue-50), #f0f9ff);
    border: 1.5px solid var(--blue-100);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .question-box::before {
    content: '';
    position: absolute;
    top: 0; left: 0; width: 4px; height: 100%;
    background: linear-gradient(180deg, var(--blue-500), var(--blue-700));
  }
  .question-text {
    font-size: 1.05rem;
    line-height: 1.75;
    color: var(--gray-800);
    padding-left: 8px;
    font-weight: 500;
  }

  /* ─── ANSWER INPUT ────────────────────────────── */
  .answer-area { display: flex; flex-direction: column; gap: 14px; }
  .input-label {
    font-size: .8rem;
    font-weight: 700;
    color: var(--gray-600);
    letter-spacing: .3px;
    text-transform: uppercase;
  }
  .answer-row { display: flex; gap: 12px; }
  .answer-input {
    flex: 1;
    border: 2px solid var(--gray-200);
    border-radius: var(--radius);
    padding: 14px 18px;
    font-size: .95rem;
    color: var(--gray-800);
    outline: none;
    transition: border-color .2s, box-shadow .2s;
    font-family: inherit;
  }
  .answer-input:focus {
    border-color: var(--blue-500);
    box-shadow: 0 0 0 4px rgba(59,130,246,.12);
  }
  .answer-input::placeholder { color: var(--gray-400); }

  .btn {
    border: none;
    border-radius: var(--radius);
    padding: 14px 28px;
    font-size: .9rem;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .2px;
    white-space: nowrap;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--blue-600), var(--blue-700));
    color: var(--white);
    box-shadow: 0 4px 12px rgba(37,99,235,.3);
  }
  .btn-primary:hover {
    background: linear-gradient(135deg, var(--blue-500), var(--blue-600));
    transform: translateY(-1px);
    box-shadow: 0 6px 18px rgba(37,99,235,.4);
  }
  .btn-primary:active { transform: translateY(0); }
  .btn-ghost {
    background: var(--gray-100);
    color: var(--gray-600);
  }
  .btn-ghost:hover { background: var(--gray-200); }

  /* ─── FEEDBACK ────────────────────────────────── */
  .feedback {
    display: none;
    border-radius: var(--radius);
    padding: 18px 20px;
    margin-top: 4px;
    border: 1.5px solid;
    animation: feedIn .3s ease;
  }
  @keyframes feedIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .feedback.correct {
    display: flex;
    background: #f0fdf4;
    border-color: #86efac;
    color: #166534;
  }
  .feedback.wrong {
    display: flex;
    background: #fef2f2;
    border-color: #fca5a5;
    color: #991b1b;
  }
  .feedback-icon { font-size: 1.3rem; margin-right: 12px; flex-shrink: 0; }
  .feedback-body {}
  .feedback-title { font-weight: 700; font-size: .9rem; margin-bottom: 2px; }
  .feedback-sub { font-size: .83rem; opacity: .8; }

  /* ─── EXPLANATION ─────────────────────────────── */
  .explanation {
    display: none;
    background: linear-gradient(135deg, #fefce8, #fff7ed);
    border: 1.5px solid #fbbf24;
    border-radius: var(--radius);
    padding: 0;
    margin-top: 12px;
    animation: feedIn .3s ease;
    overflow: hidden;
  }
  .explanation.visible { display: block; }
  .explanation-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 13px 20px;
    background: linear-gradient(90deg, #fbbf24, #f59e0b);
    color: #fff;
    font-weight: 700;
    font-size: .83rem;
    letter-spacing: .4px;
    text-transform: uppercase;
  }
  .explanation-body {
    padding: 20px 24px;
    font-size: .9rem;
    line-height: 1.85;
    color: #44403c;
  }
  .explanation-body b { color: #92400e; }
  .explanation-body .katex-display { margin: .6em 0; }
  .explanation-body table { width: 100%; border-radius: 6px; overflow: hidden; }

  /* ─── SHOW HINT BUTTON ─────────────────────────── */
  .btn-hint {
    background: linear-gradient(135deg, #fef3c7, #fde68a);
    color: #92400e;
    border: 1.5px solid #fbbf24;
    box-shadow: none;
  }
  .btn-hint:hover { background: linear-gradient(135deg, #fde68a, #fbbf24); color: #78350f; }

  /* ─── PROGRESS BAR ────────────────────────────── */
  .progress-wrap {
    background: var(--gray-200);
    border-radius: 999px;
    height: 8px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 100%;
    border-radius: 999px;
    background: linear-gradient(90deg, var(--blue-500), var(--blue-400));
    transition: width .6s ease;
  }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: .78rem;
    color: var(--gray-400);
    font-weight: 600;
  }

  /* ─── WRONG ANSWER LIST ───────────────────────── */
  .wrong-list { display: flex; flex-direction: column; gap: 16px; }
  .wrong-item {
    border: 1.5px solid var(--gray-200);
    border-radius: var(--radius);
    overflow: hidden;
    transition: box-shadow .2s;
  }
  .wrong-item:hover { box-shadow: var(--shadow-md); }
  .wrong-item-header {
    padding: 16px 20px;
    background: var(--gray-100);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .wrong-q { font-size: .9rem; font-weight: 500; color: var(--gray-800); line-height: 1.5; }
  .wrong-item-body { padding: 16px 20px; display: flex; gap: 24px; flex-wrap: wrap; }
  .answer-chip {
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .chip-label { font-size: .7rem; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--gray-400); }
  .chip-val { font-size: .9rem; font-weight: 600; }
  .chip-val.mine { color: var(--red); }
  .chip-val.correct-ans { color: var(--green); }
  .wrong-exp {
    padding: 14px 20px;
    background: #fffbeb;
    border-top: 1px solid #fde68a;
    font-size: .83rem;
    color: #78350f;
    line-height: 1.65;
  }

  /* ─── EMPTY STATE ─────────────────────────────── */
  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--gray-400);
  }
  .empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .empty-text { font-size: .9rem; font-weight: 500; }

  /* ─── NEXT BUTTON AREA ────────────────────────── */
  .action-row {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 6px;
  }

  /* ─── LOADING SKELETON ────────────────────────── */
  .skeleton {
    background: linear-gradient(90deg, #e2e8f0 25%, #f1f5f9 50%, #e2e8f0 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
    border-radius: 8px;
  }
  @keyframes shimmer {
    0%   { background-position: -200% 0; }
    100% { background-position:  200% 0; }
  }
  .sk-line { height: 14px; margin-bottom: 10px; }
  .sk-line.lg { height: 22px; width: 60%; }
  .sk-line.full { width: 100%; }
  .sk-line.w80  { width: 80%; }

  /* ─── RESPONSIVE ──────────────────────────────── */
  @media (max-width: 600px) {
    .nav { padding: 0 16px; }
    .main { padding: 20px 12px 48px; }
    .stat-bar { grid-template-columns: repeat(3,1fr); gap: 8px; }
    .stat-card { padding: 14px 8px; }
    .stat-num { font-size: 1.4rem; }
    .card-body { padding: 20px; }
    .answer-row { flex-direction: column; }
    .btn { width: 100%; text-align: center; }
  }
</style>
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav-logo">
    <div class="icon">⚡</div>
    Physics Study
  </div>
  <div class="nav-right">
    <div class="lang-toggle">
      <button class="lang-btn active" id="btn-ko" onclick="setLang('ko')">KO</button>
      <button class="lang-btn"        id="btn-en" onclick="setLang('en')">EN</button>
    </div>
  </div>
</nav>

<!-- MAIN -->
<div class="main">

  <!-- STATS -->
  <div class="stat-bar" id="stat-bar">
    <div class="stat-card">
      <div class="stat-num blue" id="stat-total">—</div>
      <div class="stat-label" data-ko="전체 문제" data-en="Total">전체 문제</div>
    </div>
    <div class="stat-card">
      <div class="stat-num green" id="stat-correct">—</div>
      <div class="stat-label" data-ko="정답" data-en="Correct">정답</div>
    </div>
    <div class="stat-card">
      <div class="stat-num red" id="stat-wrong">—</div>
      <div class="stat-label" data-ko="오답" data-en="Wrong">오답</div>
    </div>
  </div>

  <!-- TAB CARD -->
  <div class="card">
    <div class="card-body" style="padding-bottom:0">
      <div class="tabs">
        <button class="tab active" id="tab-problem" onclick="switchTab('problem')" data-ko="문제 풀기" data-en="Practice">문제 풀기</button>
        <button class="tab"        id="tab-wrong"   onclick="switchTab('wrong')"   data-ko="오답 노트" data-en="Mistakes">오답 노트</button>
        <button class="tab"        id="tab-progress" onclick="switchTab('progress')" data-ko="진도" data-en="Progress">진도</button>
      </div>
    </div>

    <!-- PROBLEM TAB -->
    <div id="problem-section" class="visible">
      <div class="card-header">
        <span class="card-title" data-ko="오늘의 문제" data-en="Today's Problem">오늘의 문제</span>
        <span class="problem-number" id="prob-counter"></span>
      </div>
      <div class="card-body">

        <!-- loading -->
        <div id="loading-skeleton">
          <div class="skeleton sk-line lg" style="margin-bottom:18px"></div>
          <div class="skeleton sk-line full"></div>
          <div class="skeleton sk-line w80"></div>
          <div class="skeleton sk-line full" style="margin-bottom:24px"></div>
          <div class="skeleton sk-line" style="width:40%;height:44px;border-radius:10px"></div>
        </div>

        <!-- content (hidden until loaded) -->
        <div id="problem-content" style="display:none">
          <div class="problem-meta">
            <span class="badge badge-blue" id="prob-concept"></span>
            <span class="badge" id="prob-difficulty"></span>
          </div>

          <div class="question-box">
            <div class="question-text" id="question-text"></div>
          </div>

          <div class="answer-area">
            <div class="input-label" data-ko="정답 입력" data-en="Your Answer">정답 입력</div>
            <div class="answer-row">
              <input
                type="text"
                class="answer-input"
                id="answer-input"
                placeholder="답을 입력하세요…"
                onkeydown="if(event.key==='Enter') submitAnswer()"
              />
              <button class="btn btn-primary" onclick="submitAnswer()" id="submit-btn">
                제출
              </button>
            </div>
          </div>

          <!-- feedback -->
          <div class="feedback" id="feedback-box">
            <div class="feedback-icon" id="feedback-icon"></div>
            <div class="feedback-body">
              <div class="feedback-title" id="feedback-title"></div>
              <div class="feedback-sub"  id="feedback-sub"></div>
            </div>
          </div>

          <!-- explanation -->
          <div class="explanation" id="explanation-box">
            <div class="explanation-header">
              <span>📐</span>
              <span id="explanation-header-text">풀이 해설</span>
            </div>
            <div class="explanation-body" id="explanation-text"></div>
          </div>

          <div class="action-row" id="action-row" style="display:none">
            <button class="btn btn-ghost" onclick="loadProblem(currentIdx)" id="retry-btn">다시 풀기</button>
            <button class="btn btn-hint" onclick="toggleExplanation()" id="hint-btn">📐 해설보기</button>
            <button class="btn btn-primary" onclick="nextProblem()" id="next-btn">다음 문제 →</button>
          </div>
        </div>

        <!-- empty -->
        <div id="problem-empty" style="display:none">
          <div class="empty">
            <div class="empty-icon">📚</div>
            <div class="empty-text" data-ko="등록된 문제가 없습니다." data-en="No problems found.">등록된 문제가 없습니다.</div>
          </div>
        </div>
      </div>
    </div>

    <!-- WRONG TAB -->
    <div id="wrong-section">
      <div class="card-header">
        <span class="card-title" data-ko="오답 노트" data-en="Mistake Review">오답 노트</span>
        <span class="badge badge-red" id="wrong-count-badge"></span>
      </div>
      <div class="card-body">
        <div id="wrong-list" class="wrong-list"></div>
        <div id="wrong-empty" class="empty" style="display:none">
          <div class="empty-icon">🎉</div>
          <div class="empty-text" data-ko="오답이 없어요! 훌륭해요." data-en="No mistakes! Great job.">오답이 없어요! 훌륭해요.</div>
        </div>
      </div>
    </div>

    <!-- PROGRESS TAB -->
    <div id="progress-section">
      <div class="card-header">
        <span class="card-title" data-ko="학습 진도" data-en="Study Progress">학습 진도</span>
      </div>
      <div class="card-body">
        <div style="margin-bottom:24px">
          <div class="progress-label" style="margin-bottom:8px">
            <span data-ko="전체 정답률" data-en="Accuracy">전체 정답률</span>
            <span id="pct-label">—</span>
          </div>
          <div class="progress-wrap">
            <div class="progress-bar" id="progress-bar" style="width:0%"></div>
          </div>
          <div class="progress-label">
            <span id="pct-correct-label"></span>
            <span id="pct-total-label"></span>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
          <div style="background:var(--blue-50);border:1.5px solid var(--blue-100);border-radius:var(--radius);padding:18px;text-align:center">
            <div style="font-size:1.6rem;font-weight:800;color:var(--blue-700)" id="prog-solved">—</div>
            <div style="font-size:.78rem;color:var(--blue-500);font-weight:600;margin-top:4px" data-ko="풀어본 문제" data-en="Solved">풀어본 문제</div>
          </div>
          <div style="background:#f0fdf4;border:1.5px solid #86efac;border-radius:var(--radius);padding:18px;text-align:center">
            <div style="font-size:1.6rem;font-weight:800;color:#16a34a" id="prog-streak">🔥 0</div>
            <div style="font-size:.78rem;color:#16a34a;font-weight:600;margin-top:4px" data-ko="연속 정답" data-en="Streak">연속 정답</div>
          </div>
        </div>
      </div>
    </div>

  </div><!-- .card -->
</div><!-- .main -->

<script>
/* ============================================================
   STATE
   ============================================================ */
let lang = localStorage.getItem('lang') || 'ko';
let problems = [];
let currentIdx = 0;
let sessionCorrect = 0;
let sessionWrong = 0;
let streak = 0;
let answered = false;

const STUDENT_ID = 1;
const ASSIGNMENT_ID = 1;

// 환경 자동 감지: GitHub Pages → Render / 로컬 → localhost:8000
const API = (() => {
  const h = window.location.hostname;
  if (h === 'localhost' || h === '127.0.0.1') {
    return window.location.port === '8000' ? '' : 'http://localhost:8000';
  }
  return 'https://physics-study-api.onrender.com';
})();

/* ============================================================
   LANG
   ============================================================ */
function setLang(l) {
  lang = l;
  localStorage.setItem('lang', l);
  document.getElementById('btn-ko').classList.toggle('active', l === 'ko');
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  // update all data-ko / data-en texts
  document.querySelectorAll('[data-ko]').forEach(el => {
    el.textContent = l === 'ko' ? el.dataset.ko : el.dataset.en;
  });
  // re-render current problem text if loaded
  renderProblem();
  loadWrongAnswers();
}

/* ============================================================
   TABS
   ============================================================ */
function switchTab(tab) {
  ['problem','wrong','progress'].forEach(t => {
    document.getElementById(`${t}-section`).classList.toggle('visible', t === tab);
    document.getElementById(`tab-${t}`).classList.toggle('active', t === tab);
  });
  if (tab === 'wrong') loadWrongAnswers();
  if (tab === 'progress') renderProgress();
}

/* ============================================================
   LOAD PROBLEMS
   ============================================================ */
async function loadProblems() {
  try {
    const res = await fetch(`${API}/problems`);
    problems = await res.json();
  } catch(e) {
    problems = [];
  }
  document.getElementById('stat-total').textContent = problems.length;
  document.getElementById('loading-skeleton').style.display = 'none';
  if (!problems.length) {
    document.getElementById('problem-empty').style.display = 'block';
  } else {
    document.getElementById('problem-content').style.display = 'block';
    loadProblem(0);
  }
}

function loadProblem(idx) {
  if (!problems.length) return;
  currentIdx = idx % problems.length;
  answered = false;

  document.getElementById('feedback-box').className = 'feedback';
  document.getElementById('explanation-box').className = 'explanation';
  document.getElementById('explanation-text').innerHTML = '';
  document.getElementById('action-row').style.display = 'none';
  document.getElementById('answer-input').value = '';
  document.getElementById('submit-btn').disabled = false;

  renderProblem();
}

function renderProblem() {
  if (!problems.length) return;
  const p = problems[currentIdx];

  const qText = lang === 'ko' ? p.question_text_ko : p.question_text_en;
  document.getElementById('question-text').textContent = qText || '—';

  const concept = lang === 'ko' ? p.concept_ko : p.concept_en;
  document.getElementById('prob-concept').textContent = concept || '';

  const diff = p.difficulty;
  const diffEl = document.getElementById('prob-difficulty');
  diffEl.textContent = diff || '';
  diffEl.className = 'badge ' + ({
    easy: 'badge-green', medium: 'badge-yellow', hard: 'badge-red'
  }[diff?.toLowerCase()] || 'badge-blue');

  document.getElementById('prob-counter').textContent =
    `${currentIdx + 1} / ${problems.length}`;

  // update submit btn text
  document.getElementById('submit-btn').textContent =
    lang === 'ko' ? '제출' : 'Submit';
  document.getElementById('answer-input').placeholder =
    lang === 'ko' ? '답을 입력하세요…' : 'Enter your answer…';
}

function nextProblem() {
  loadProblem(currentIdx + 1);
}

/* ============================================================
   TOGGLE EXPLANATION
   ============================================================ */
function toggleExplanation() {
  const box = document.getElementById('explanation-box');
  const btn = document.getElementById('hint-btn');
  const p   = problems[currentIdx];
  const expHtml = lang === 'ko' ? p.explanation_ko : p.explanation_en;

  if (box.classList.contains('visible')) {
    box.classList.remove('visible');
    btn.textContent = lang === 'ko' ? '📐 해설보기' : '📐 Show Solution';
  } else {
    document.getElementById('explanation-header-text').textContent =
      lang === 'ko' ? '풀이 해설' : 'Solution';
    document.getElementById('explanation-text').innerHTML = expHtml || '—';
    box.classList.add('visible');
    btn.textContent = lang === 'ko' ? '해설 닫기' : 'Hide Solution';
    // re-render KaTeX inside the newly shown content
    if (window.renderMathInElement) {
      renderMathInElement(document.getElementById('explanation-text'), {
        delimiters: [
          {left:'$$', right:'$$', display:true},
          {left:'$', right:'$', display:false}
        ],
        throwOnError: false
      });
    }
  }
}

/* ============================================================
   SUBMIT
   ============================================================ */
async function submitAnswer() {
  if (answered) return;
  const ans = document.getElementById('answer-input').value.trim();
  if (!ans) {
    document.getElementById('answer-input').style.borderColor = 'var(--red)';
    setTimeout(() => document.getElementById('answer-input').style.borderColor = '', 800);
    return;
  }
  answered = true;
  document.getElementById('submit-btn').disabled = true;

  let isCorrect = false;
  try {
    const res = await fetch(`${API}/submit`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({
        student_id: STUDENT_ID,
        assignment_id: ASSIGNMENT_ID,
        problem_id: problems[currentIdx].id,
        answer: ans
      })
    });
    const data = await res.json();
    isCorrect = data.correct;
  } catch(e) {
    // offline fallback: compare locally
    isCorrect = ans === problems[currentIdx].correct_answer;
  }

  // feedback
  const fb = document.getElementById('feedback-box');
  const fbIcon = document.getElementById('feedback-icon');
  const fbTitle = document.getElementById('feedback-title');
  const fbSub = document.getElementById('feedback-sub');

  if (isCorrect) {
    fb.className = 'feedback correct';
    fbIcon.textContent = '✅';
    fbTitle.textContent = lang === 'ko' ? '정답입니다!' : 'Correct!';
    fbSub.textContent  = lang === 'ko' ? '훌륭해요. 해설로 개념을 확인해 보세요.' : 'Well done! Check the solution to reinforce the concept.';
    sessionCorrect++;
    streak++;
    document.getElementById('stat-correct').textContent = sessionCorrect;
  } else {
    fb.className = 'feedback wrong';
    fbIcon.textContent = '❌';
    fbTitle.textContent = lang === 'ko' ? '틀렸습니다.' : 'Incorrect.';
    const correct = problems[currentIdx].correct_answer;
    fbSub.textContent = (lang === 'ko' ? '정답: ' : 'Answer: ') + correct;
    sessionWrong++;
    streak = 0;
    document.getElementById('stat-wrong').textContent = sessionWrong;
  }

  document.getElementById('action-row').style.display = 'flex';
  document.getElementById('retry-btn').textContent  = lang === 'ko' ? '다시 풀기' : 'Retry';
  document.getElementById('hint-btn').textContent   = lang === 'ko' ? '📐 해설보기' : '📐 Show Solution';
  document.getElementById('next-btn').textContent   = lang === 'ko' ? '다음 문제 →' : 'Next →';
}

/* ============================================================
   WRONG ANSWERS
   ============================================================ */
async function loadWrongAnswers() {
  const list = document.getElementById('wrong-list');
  list.innerHTML = `<div class="skeleton sk-line full" style="height:80px;border-radius:12px"></div>`;
  let wrongs = [];
  try {
    const res = await fetch(`${API}/wrong-answers/${STUDENT_ID}`);
    wrongs = await res.json();
  } catch(e) {}

  document.getElementById('wrong-count-badge').textContent =
    wrongs.length + (lang === 'ko' ? '개' : '');

  if (!wrongs.length) {
    list.innerHTML = '';
    document.getElementById('wrong-empty').style.display = 'block';
    return;
  }
  document.getElementById('wrong-empty').style.display = 'none';

  list.innerHTML = wrongs.map((w, i) => {
    const q    = lang === 'ko' ? w.question_ko    : w.question_en;
    const exp  = lang === 'ko' ? w.explanation_ko : w.explanation_en;
    return `
    <div class="wrong-item">
      <div class="wrong-item-header">
        <span class="badge badge-red" style="flex-shrink:0">${i+1}</span>
        <div class="wrong-q">${q || '—'}</div>
      </div>
      <div class="wrong-item-body">
        <div class="answer-chip">
          <span class="chip-label">${lang === 'ko' ? '내 답' : 'Your Answer'}</span>
          <span class="chip-val mine">${w.your_answer}</span>
        </div>
        <div class="answer-chip">
          <span class="chip-label">${lang === 'ko' ? '정답' : 'Correct Answer'}</span>
          <span class="chip-val correct-ans">${w.correct_answer}</span>
        </div>
      </div>
      ${exp ? `<div class="wrong-exp">${exp}</div>` : ''}
    </div>`;
  }).join('');
}

/* ============================================================
   PROGRESS
   ============================================================ */
function renderProgress() {
  const total   = sessionCorrect + sessionWrong;
  const pct     = total ? Math.round(sessionCorrect / total * 100) : 0;
  document.getElementById('progress-bar').style.width  = pct + '%';
  document.getElementById('pct-label').textContent     = pct + '%';
  document.getElementById('pct-correct-label').textContent =
    (lang === 'ko' ? '정답 ' : 'Correct ') + sessionCorrect;
  document.getElementById('pct-total-label').textContent  =
    (lang === 'ko' ? '총 ' : 'Total ') + total;
  document.getElementById('prog-solved').textContent  = total;
  document.getElementById('prog-streak').textContent  = '🔥 ' + streak;
}

/* ============================================================
   INIT
   ============================================================ */
setLang(lang);
loadProblems();
</script>
</body>
</html>
